<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
.header {
    width: 100%;
    background-color: #ccc;
}
.product_row {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 1300px;
    margin: 40px auto 0px;
}
.card {
    width: 25%;
    border: 1px solid #ccc;
    border-radius: 15px;
    overflow: hidden;
    padding: 20px;
}
.card img {
    width: 100%;
    height: 250px;
    object-fit: contain;
}
.info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0px 20px;
    border-top: 1px solid #ccc;
}
.info h4 {
    font-size: 20px;
    margin: 0;
    font-weight: bold;
    font-family: cursive;
}
.info h4, .info p {
    font-size: 20px;
    margin: 0;
    font-weight: bold;
    font-family: cursive;
}
.info p {
    font-size: 18px;
    color: red;
}
.card button{
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 2px solid red;
    background: #0000;
    font-size: 18px;
    font-weight: 600;
    font-family: cursive;
    display: block;
    text-align: center;
    color: #000;
    text-decoration: none;
}
</style>

<body>
    
    <div class="header">

    </div>
    <div class="home-page">
    </div>
    

    <script src="script.js"></script>
</body>
</html>
