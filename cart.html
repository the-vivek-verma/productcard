<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
</head>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
.header {
    width: 100%;
    background-color: #ccc;
}
.cart-section {
    width: 100%;
    max-width: 1300px;
    margin: 40px auto 0px;
}
.cart-section h1 {
    font-size: 30px;
    font-weight: bold;
    font-family: cursive;
}
.cart_items {
    display: flex;
    flex-flow: column;
    gap: 20px;
    width: 60%;
}
.cart-item {
    display: flex;
    gap: 30px;
    border: 1px solid #ccc;
    padding: 20px;
    border-radius: 10px;
}
.cart-image {
    width: 150px;
    height: 150px;
    border-radius: 10px;
    border: 1px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px;
    background: #ccc;
}
.cart-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
.cart-info h4 {
    font-size: 30px;
    margin: 0 0 10px;
    color: #000;
    font-family: cursive;
}
.cart-info p {
    font-size: 20px;
    color: red;
    font-weight: bold;
    font-family: cursive;
}
.cart-section-inner {
    display: flex;
    gap: 30px;
    margin: 40px 0px;
}
.cart_summry {
    border: 1px solid #ccc;
    padding: 20px;
    width: 40%;
    border-radius: 10px;
}
.cart_summry .summry {
    font-size: 25px;
    color: #000;
    font-family: cursive;
    border-bottom: 1px solid #ccc;
    padding-bottom: 15px;
    margin-bottom: 15px;
}
.cart-total p {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 18px;
    font-family: cursive;
}
.cart-total {
    display: flex;
    flex-flow: column;
    gap: 10px;
}
</style>
<body>
    
    <div class="header">

    </div>
    <div class="cart-section">
        <h1>Cart page</h1>
        <div class="cart-section-inner">
            <div class="cart_items">
            </div>
            <div class="cart_summry">
                <h4 class="summry">Cart Summary</h4>
                <div class="cart-total">
                    <p>Total items: <span class="total_items">0</span></p>
                    <p>Total price: <span class="total_price">$0</span></p>  
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
